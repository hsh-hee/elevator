<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>엘리베이터 카운터 - 관리자용</title>
  <style>
    body {
      font-family: sans-serif;
      background: #1e293b;
      color: white;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 20px;
    }

    .video-wrap {
      position: relative;
      width: 100%;
      max-width: 480px;
    }

    video,
    canvas#overlay {
      width: 100%;
      border-radius: 12px;
    }

    canvas#overlay {
      position: absolute;
      top: 0;
      left: 0;
    }

    canvas#buf {
      display: none;
    }

    .status {
      font-size: 14px;
      color: #94a3b8;
      margin-top: 10px;
    }

    .info-box {
      background: #0f172a;
      padding: 15px;
      border-radius: 8px;
      margin-top: 15px;
      text-align: center;
      width: 100%;
      max-width: 480px;
    }

    .btn {
      margin-top: 12px;
      padding: 10px 24px;
      background: #ef4444;
      color: white;
      border: none;
      border-radius: 8px;
      cursor: pointer;
    }

    .wait-time {
      color: #facc15;
      font-weight: bold;
    }
  </style>
</head>

<body>
  <h2>🛠️ 카운터 관리자 모드</h2>

  <div class="video-wrap">
    <video id="cam" autoplay playsinline muted></video>
    <canvas id="overlay"></canvas>
  </div>

  <canvas id="buf"></canvas>

  <div class="status" id="status">네트워크 서버 연결 중...</div>

  <div class="info-box">
    <p>
      현재 원격 전송 중인 인원:
      <strong id="admin-count" style="color:#38bdf8">0</strong>명
    </p>
    <p>
      예상 대기시간:
      <span id="admin-wait" class="wait-time">0</span>분
    </p>
    <button class="btn" onclick="resetCount()">🔄 인원 초기화</button>
  </div>

<script>
  // ==============================
  // 엘리베이터 기본 설정
  // ==============================

  // 엘리베이터 1층 → 4층 → 다시 1층까지 약 40초로 계산
  const ELEVATOR_CYCLE_SEC = 40;

  // 엘리베이터 2대 × 1대당 약 7명 탑승 기준
  const MAX_CAPACITY = 14;

  // 밀리초 단위로 변환
  const CYCLE_MS = ELEVATOR_CYCLE_SEC * 1000;

  let waitingCount = 0;

  // 마지막으로 엘리베이터가 사람을 태웠다고 계산한 시간
  let lastElevatorTime = Date.now();

  let prevFrame = null;
  let bgFrame = null;
  let frameCount = 0;
  let trackedBlobs = [];
  let nextBlobId = 0;
  let lastCountTime = 0;
  let wakeLock = null;

  const video = document.getElementById("cam");
  const overlay = document.getElementById("overlay");
  const buf = document.getElementById("buf");

  const octx = overlay.getContext("2d");
  const bctx = buf.getContext("2d");

  // ntfy 전송 주소
  const TOPIC_URL = "https://ntfy.sh/seowon0309_elevator_secret_channel";

  // ==============================
  // 대기시간 계산 함수
  // ==============================

  function calculateWaitTime() {
    if (waitingCount <= 0) {
      return 0;
    }

    const now = Date.now();
    const elapsed = now - lastElevatorTime;

    // 이번 엘리베이터 사이클까지 남은 시간
    const remainingThisCycle = Math.max(0, CYCLE_MS - elapsed);

    // 현재 대기인원을 모두 태우기 위해 필요한 운행 횟수
    const tripsNeeded = Math.ceil(waitingCount / MAX_CAPACITY);

    // 첫 번째 엘리베이터까지 남은 시간 + 추가 운행 시간
    const waitMs = remainingThisCycle + ((tripsNeeded - 1) * CYCLE_MS);

    // 분 단위로 변환
    return (waitMs / 60000).toFixed(1);
  }

  // ==============================
  // 서버로 인원수 + 대기시간 전송
  // ==============================

  function sendToServer() {
    const wait = calculateWaitTime();

    document.getElementById("admin-count").innerText = waitingCount;
    document.getElementById("admin-wait").innerText = wait;

    // 형식: "대기인원,대기시간"
    fetch(TOPIC_URL, {
      method: "POST",
      body: `${waitingCount},${wait}`
    }).catch(e => console.error("전송 실패:", e));
  }

  // ==============================
  // 시간이 지나면 대기인원 감소
  // ==============================

  function updateElevatorCycle() {
    const now = Date.now();

    if (now - lastElevatorTime >= CYCLE_MS) {
      const passedCycles = Math.floor((now - lastElevatorTime) / CYCLE_MS);

      // 40초마다 14명씩 감소
      const decreaseCount = passedCycles * MAX_CAPACITY;

      waitingCount = Math.max(0, waitingCount - decreaseCount);

      // 엘리베이터 기준 시간 갱신
      lastElevatorTime += passedCycles * CYCLE_MS;

      sendToServer();
    }
  }

  // 처음 상태 전송
  sendToServer();

  // 1초마다 엘리베이터 사이클 확인
  setInterval(updateElevatorCycle, 1000);

  // 대기시간이 자연스럽게 줄어들도록 5초마다 재전송
  setInterval(sendToServer, 5000);

  // ==============================
  // 카메라 실행
  // ==============================

  navigator.mediaDevices.getUserMedia({
    video: {
      facingMode: "environment",
      width: 640,
      height: 480
    }
  })
  .then(stream => {
    video.srcObject = stream;

    video.onloadedmetadata = () => {
      overlay.width = video.videoWidth;
      overlay.height = video.videoHeight;

      buf.width = video.videoWidth;
      buf.height = video.videoHeight;

      requestWakeLock();
      requestAnimationFrame(processFrame);
    };
  })
  .catch(err => {
    document.getElementById("status").innerText = "❌ 오류: " + err.message;
  });

  // ==============================
  // 화면 꺼짐 방지
  // ==============================

  async function requestWakeLock() {
    try {
      if ("wakeLock" in navigator) {
        wakeLock = await navigator.wakeLock.request("screen");
        document.getElementById("status").innerText = "✅ 원격 감지 중 (화면 켜짐 고정)";
      } else {
        document.getElementById("status").innerText = "✅ 원격 감지 중";
      }
    } catch (err) {
      document.getElementById("status").innerText = "✅ 원격 감지 중";
    }
  }

  // ==============================
  // 영상 프레임 분석
  // ==============================

  function processFrame() {
    const W = buf.width;
    const H = buf.height;
    const lineX = W / 2;

    bctx.drawImage(video, 0, 0, W, H);
    const curr = bctx.getImageData(0, 0, W, H);

    octx.clearRect(0, 0, W, H);

    // 중앙선 표시
    octx.strokeStyle = "rgba(56, 189, 248, 0.8)";
    octx.lineWidth = 4;
    octx.beginPath();
    octx.moveTo(lineX, 0);
    octx.lineTo(lineX, H);
    octx.stroke();

    if (prevFrame) {
      frameCount++;

      // 배경 프레임 업데이트
      if (!bgFrame || frameCount % 45 === 0) {
        bgFrame = prevFrame;
      }

      const diff = new Uint8ClampedArray(W * H);
      const pData = bgFrame.data;
      const cData = curr.data;

      for (let i = 0; i < W * H; i++) {
        const rDiff = Math.abs(cData[i * 4] - pData[i * 4]);
        const gDiff = Math.abs(cData[i * 4 + 1] - pData[i * 4 + 1]);
        const bDiff = Math.abs(cData[i * 4 + 2] - pData[i * 4 + 2]);

        const avgDiff = (rDiff + gDiff + bDiff) / 3;

        if (avgDiff > 50) {
          diff[i] = 255;
        } else {
          diff[i] = 0;
        }
      }

      const currentBlobs = findBlobsStrict(diff, W, H);
      const nextTrackedBlobs = [];
      const now = Date.now();

      currentBlobs.forEach(blob => {
        // 감지 박스 표시
        octx.strokeStyle = "#facc15";
        octx.lineWidth = 3;
        octx.strokeRect(blob.x, blob.y, blob.w, blob.h);

        let bestMatch = null;
        let minDistance = 80;

        trackedBlobs.forEach(p => {
          const dist = Math.hypot(p.cx - blob.cx, p.cy - blob.cy);

          if (dist < minDistance) {
            minDistance = dist;
            bestMatch = p;
          }
        });

        if (bestMatch) {
          blob.id = bestMatch.id;
          blob.startedInLeftZone = bestMatch.startedInLeftZone;
          blob.isCounted = bestMatch.isCounted;

          const moveX = blob.cx - bestMatch.cx;

          // 왼쪽에서 시작해서 오른쪽으로 중앙선을 넘으면 카운트
          if (
            !blob.isCounted &&
            blob.startedInLeftZone &&
            bestMatch.cx < lineX &&
            blob.cx >= lineX &&
            moveX > 0
          ) {
            // 너무 짧은 시간 안에 중복 카운트 방지
            if (now - lastCountTime > 1200) {
              waitingCount++;
              blob.isCounted = true;
              lastCountTime = now;

              flashLine("#34d399");
              sendToServer();
            }
          }
        } else {
          blob.id = nextBlobId++;
          blob.isCounted = false;
          blob.startedInLeftZone = blob.cx < lineX - 15;
        }

        nextTrackedBlobs.push(blob);
      });

      trackedBlobs = nextTrackedBlobs;
    }

    prevFrame = curr;
    requestAnimationFrame(processFrame);
  }

  // ==============================
  // 움직임 덩어리 찾기
  // ==============================

  function findBlobsStrict(diff, W, H) {
    const blobs = [];
    const step = 12;

    for (let y = 0; y < H; y += step) {
      for (let x = 0; x < W; x += step) {
        if (diff[y * W + x] === 255) {
          let found = false;

          for (let b of blobs) {
            if (
              x >= b.x - 20 &&
              x <= b.x + b.w + 20 &&
              y >= b.y - 20 &&
              y <= b.y + b.h + 20
            ) {
              let x1 = Math.min(b.x, x);
              let x2 = Math.max(b.x + b.w, x);
              let y1 = Math.min(b.y, y);
              let y2 = Math.max(b.y + b.h, y);

              b.x = x1;
              b.y = y1;
              b.w = x2 - x1;
              b.h = y2 - y1;
              b.cx = x1 + b.w / 2;
              b.cy = y1 + b.h / 2;

              found = true;
              break;
            }
          }

          if (!found) {
            blobs.push({
              x: x,
              y: y,
              w: step,
              h: step,
              cx: x + step / 2,
              cy: y + step / 2
            });
          }
        }
      }
    }

    // 사람 전체를 감지하려면 기존 기준 유지
    return blobs.filter(b => b.w > 110 && b.h > 110);

    // 만약 신발만 감지하고 싶으면 위 줄 대신 아래 줄 사용
    // return blobs.filter(b => b.w > 40 && b.h > 30);
  }

  // ==============================
  // 카운트 성공 표시
  // ==============================

  function flashLine(color) {
    overlay.style.outline = `8px solid ${color}`;

    setTimeout(() => {
      overlay.style.outline = "none";
    }, 350);
  }

  // ==============================
  // 인원 초기화
  // ==============================

  function resetCount() {
    waitingCount = 0;
    trackedBlobs = [];
    lastCountTime = 0;
    lastElevatorTime = Date.now();

    sendToServer();
  }
</script>
</body>
</html>
